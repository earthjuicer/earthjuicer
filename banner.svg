<svg width="860" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .scanline { fill: none; stroke: #00ff9d; stroke-width: 0.3; opacity: 0.07; }
      .border { fill: none; stroke: #00ff9d; stroke-width: 1.5; opacity: 0.6; }
      .corner { fill: #00ff9d; opacity: 0.8; }
      .title {
        font-family: 'Courier New', Courier, monospace;
        font-size: 38px;
        font-weight: bold;
        fill: #00ff9d;
      }
      .subtitle {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13px;
        fill: #00ff9d;
        opacity: 0.7;
      }
      .tag-text {
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        fill: #00ff9d;
        opacity: 0.9;
      }
      .status-text {
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        fill: #00ff9d;
        opacity: 0.35;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes flicker {
        0%, 94%, 100% { opacity: 1; }
        95% { opacity: 0.3; }
        97% { opacity: 0.85; }
      }
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-18px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); opacity: 0.5; }
        50% { transform: translateY(-7px); opacity: 1; }
      }
      @keyframes drip {
        0%   { transform: translateY(0px);  opacity: 1; }
        80%  { transform: translateY(26px); opacity: 1; }
        100% { transform: translateY(26px); opacity: 0; }
      }
      @keyframes ripple {
        0%   { r: 14; opacity: 0.7; }
        100% { r: 48; opacity: 0; }
      }
      @keyframes glowPulse {
        0%, 100% { filter: url(#glow1); }
        50% { filter: url(#glow2); }
      }

      .cursor { fill: #00ff9d; animation: blink 1s step-end infinite; }
      .title-anim { animation: slideIn 0.7s ease-out both, flicker 7s 2s ease-in-out infinite; }
      .sub-anim  { animation: fadeUp 0.7s 0.5s ease-out both; }
      .tag1-anim { animation: fadeUp 0.6s 0.8s ease-out both; }
      .tag2-anim { animation: fadeUp 0.6s 1.0s ease-out both; }
      .tag3-anim { animation: fadeUp 0.6s 1.2s ease-out both; }
      .p1 { animation: float 3.5s 0.0s ease-in-out infinite; }
      .p2 { animation: float 4.2s 0.9s ease-in-out infinite; }
      .p3 { animation: float 3.9s 1.5s ease-in-out infinite; }
      .p4 { animation: float 5.1s 0.4s ease-in-out infinite; }
      .p5 { animation: float 4.6s 2.1s ease-in-out infinite; }
      .drip1 { animation: drip 2.2s 0.1s ease-in infinite; }
      .drip2 { animation: drip 2.2s 0.8s ease-in infinite; }
      .drip3 { animation: drip 2.2s 1.5s ease-in infinite; }
      .ring1 { animation: ripple 2.8s 0.5s ease-out infinite; }
      .ring2 { animation: ripple 2.8s 1.9s ease-out infinite; }
    </style>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" class="bg" rx="8"/>

  <!-- Scanlines -->
  <line x1="0" y1="20"  x2="860" y2="20"  class="scanline"/>
  <line x1="0" y1="40"  x2="860" y2="40"  class="scanline"/>
  <line x1="0" y1="60"  x2="860" y2="60"  class="scanline"/>
  <line x1="0" y1="80"  x2="860" y2="80"  class="scanline"/>
  <line x1="0" y1="100" x2="860" y2="100" class="scanline"/>
  <line x1="0" y1="120" x2="860" y2="120" class="scanline"/>
  <line x1="0" y1="140" x2="860" y2="140" class="scanline"/>
  <line x1="0" y1="160" x2="860" y2="160" class="scanline"/>
  <line x1="0" y1="180" x2="860" y2="180" class="scanline"/>

  <!-- Border -->
  <rect x="4" y="4" width="852" height="192" class="border" rx="6"/>

  <!-- Corner accents -->
  <rect x="4"   y="4"   width="14" height="3" class="corner"/>
  <rect x="4"   y="4"   width="3"  height="14" class="corner"/>
  <rect x="842" y="4"   width="14" height="3" class="corner"/>
  <rect x="853" y="4"   width="3"  height="14" class="corner"/>
  <rect x="4"   y="193" width="14" height="3" class="corner"/>
  <rect x="4"   y="183" width="3"  height="14" class="corner"/>
  <rect x="842" y="193" width="14" height="3" class="corner"/>
  <rect x="853" y="183" width="3"  height="14" class="corner"/>

  <!-- Ambient particles (left) -->
  <circle cx="42"  cy="52"  r="1.5" fill="#00ff9d" class="p1"/>
  <circle cx="68"  cy="168" r="1.0" fill="#00ff9d" class="p2"/>
  <circle cx="28"  cy="128" r="2.0" fill="#00ff9d" class="p3"/>

  <!-- ===== JUICER (right side) ===== -->
  <!-- Funnel top -->
  <polygon points="750,60 798,60 791,38 757,38" fill="#0d1117" stroke="#00ff9d" stroke-width="1.5" opacity="0.9"/>
  <!-- Body -->
  <rect x="745" y="60" width="58" height="68" rx="6" fill="#0d1117" stroke="#00ff9d" stroke-width="1.5" opacity="0.9"/>
  <!-- Spout -->
  <rect x="802" y="90" width="24" height="10" rx="3" fill="#0d1117" stroke="#00ff9d" stroke-width="1.5" opacity="0.9"/>
  <!-- Button ring -->
  <circle cx="774" cy="110" r="8" fill="#00ff9d" opacity="0.12" stroke="#00ff9d" stroke-width="1.2"/>
  <!-- Button center -->
  <circle cx="774" cy="110" r="3.5" fill="#00ff9d" opacity="0.9"/>
  <!-- Drips -->
  <rect x="822" y="100" width="3" height="10" rx="1.5" fill="#00ff9d" class="drip1"/>
  <rect x="816" y="100" width="3" height="10" rx="1.5" fill="#00ff9d" class="drip2"/>
  <rect x="828" y="100" width="3" height="10" rx="1.5" fill="#00ff9d" class="drip3"/>
  <!-- Cup -->
  <polygon points="810,128 836,128 830,155 816,155" fill="#0d1117" stroke="#00ff9d" stroke-width="1.2" opacity="0.85"/>
  <!-- Liquid fill in cup -->
  <polygon points="812,143 834,143 830,155 816,155" fill="#00ff9d" opacity="0.2"/>
  <!-- Ripple rings (pulsing from juicer center) -->
  <circle cx="774" cy="94" r="14" fill="none" stroke="#00ff9d" stroke-width="1" opacity="0" class="ring1"/>
  <circle cx="774" cy="94" r="14" fill="none" stroke="#00ff9d" stroke-width="1" opacity="0" class="ring2"/>
  <!-- Juicer particles -->
  <circle cx="758" cy="50" r="1.5" fill="#00ff9d" class="p4"/>
  <circle cx="836" cy="72" r="1.0" fill="#00ff9d" class="p5"/>

  <!-- ===== TEXT ===== -->
  <!-- Title -->
  <text x="36" y="87" class="title title-anim" filter="url(#glow1)">earthjuicer 🧃</text>
  <!-- Blinking cursor -->
  <rect x="374" y="60" width="3" height="32" class="cursor"/>

  <!-- Subtitle -->
  <text x="38" y="116" class="subtitle sub-anim">squeezing the earth, one commit at a time</text>

  <!-- Tag 1: gaming -->
  <g class="tag1-anim">
    <rect x="37" y="131" width="76" height="22" rx="4" fill="#00ff9d" opacity="0.1" stroke="#00ff9d" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="50" y="146" class="tag-text">🎮 gaming</text>
  </g>
  <!-- Tag 2: AI -->
  <g class="tag2-anim">
    <rect x="121" y="131" width="50" height="22" rx="4" fill="#00ff9d" opacity="0.1" stroke="#00ff9d" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="131" y="146" class="tag-text">🤖 AI</text>
  </g>
  <!-- Tag 3: anti-coding -->
  <g class="tag3-anim">
    <rect x="179" y="131" width="116" height="22" rx="4" fill="#00ff9d" opacity="0.05" stroke="#00ff9d" stroke-width="0.8" stroke-opacity="0.25"/>
    <text x="189" y="146" class="tag-text" opacity="0.5">💤 anti-coding</text>
  </g>

  <!-- Status bar -->
  <text x="38" y="178" class="status-text">[ STATUS: in a game. brb never. ]</text>
</svg>
